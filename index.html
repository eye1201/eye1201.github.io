<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>E.Y.E.webs</title>
		<link rel="icon" type="image/png" href="img/eyewebsLogoFavicon.png"/>
		<link rel="stylesheet" href="css/eyewebstyle.css" type="text/css"/>
		<!-- HTML meta refresh URL redirection -->
		<!--<meta http-equiv="refresh" content="10; url=/"/>-->
		<!--configuracion de la PWA-->
		<link rel="manifest" href="manifest.json" />
		<!-- redireccion mantenimiento-->
		<script>
			fetch('config.json')
				.then(response => response.json())
				.then(data => {
					const ahora = new Date();
					const fin = new Date(data.fechaFin);
					
					if (data.mantenimientoActivo && ahora < fin) {
						window.location.href = "../mantenimiento.html";
					}
				});
		</script>
	</head>
	<body>
		<div class="content">
			<!--encabezado-->
			<nav role="navigation">
				<div id="menuToggle">
					<!--
					A fake / hidden checkbox is used as click reciever,
					so you can use the :checked selector on it.
					-->
					<input type="checkbox" />			
					<!--
					Some spans to act as a hamburger.
					They are acting like a real hamburger,
					not that McDonalds stuff.
					-->
					<span></span>
					<span></span>
					<span></span>
					<!--
					Too bad the menu has to be inside of the button
					but hey, it's pure CSS magic.
					-->
					<ul id="menu">
						<a href="."><li class="active">▻ Inicio</li></a>
						<a href="/dispositivos/"><li>⌲ El Comparador</li></a>
						<a href="/dispositivos/Landing_NLM.html"><li>⌲ El recomendador de NLM</li></a>
					</ul>
				</div>
				<div class="logoTitulo">
					<img type="png" id="imglogo" onclick="window.open('index.html', '_self')" style="display: block; margin-left: auto; margin-right: auto; width: 7%;" src="img/eyewebsLogoTransparente.png" alt="EYE webs Logo"/>
					<p id="titulo"><b>E.Y.E.webs</b></p>
				</div>
			</nav>
			<!--fin encabezado-->
			<br/>
			<!--contenido de pagina de pagina-->
			<div class="contentb">
 				<!-- texto de bienvenida -->
				 <div class="productos" style="text-align: center;">
					<p>Bienvenido/a a la página principal de E.Y.E.webs</p>
				</div>
			</div>
			<!--fin contenido de pagina de pagina-->
			<!--pie de pagina-->
			<footer>
				<!-- Botón Imprimir integrado en el pie -->
				<p hidden class="printPageButton">
					<button onclick="window.print();"> Imprimir 🖨️ página 📝 </button>
				</p>
				<p>© 2021-2026 | diseñado por: E.Y.E.</p>
				
				<!-- El botón de subir suele ir al final para que cargue lo último -->
				<a href='#' class="stt" title="Subir arriba"></a>
			</footer>
			<!--fin pie de pagina-->
		</div>
	</body>
</html>
