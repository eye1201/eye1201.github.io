<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Redirigiendo a la nueva sección de dispositivos...</title>
  
  <script>
    // URL base de destino
    const nuevaUrl = "https://eye1201.github.io/dispositivos/ordenadores.html";
    
    // Capturamos el hash actual si existe (ej. #ASUS-ZenBook...)
    const hash = window.location.hash;
    
    // Redirigimos inmediatamente sumando el hash. 
    // Usamos replace() en lugar de assign() o href para no romper el botón "Atrás" del navegador.
    window.location.replace(nuevaUrl + hash);
  </script>

  <meta http-equiv="refresh" content="0; url=https://eye1201.github.io/dispositivos/ordenadores.html">
  
  <link rel="canonical" href="https://eye1201.github.io/dispositivos/ordenadores.html" />
</head>
<body>
  <p>Nos hemos mudado. Si no eres redirigido en un par de segundos, <a href="https://eye1201.github.io/dispositivos/ordenadores.html">haz clic aquí</a>.</p>
</body>
</html>
