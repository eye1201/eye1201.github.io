<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

		<link rel="icon" type="image/png" href="img/eyewebsLogoFavicon.png"/>
		<link rel="stylesheet" href="css/eyewebstyle.css" type="text/css"/>
		<meta name="theme-color" content="#ededed">
		<meta http-equiv="refresh" content="10; url=/"/>
	</head>
	<body>
		<div class="content">
			<!--encabezado-->
			<nav role="navigation">
				<div id="menuToggle">
					<!--
					A fake / hidden checkbox is used as click reciever,
					so you can use the :checked selector on it.
					-->
					<input type="checkbox" />			
					<!--
					Some spans to act as a hamburger.
					They are acting like a real hamburger,
					not that McDonalds stuff.
					-->
					<span></span>
					<span></span>
					<span></span>
					<!--
					Too bad the menu has to be inside of the button
					but hey, it's pure CSS magic.
					-->
					<ul id="menu">
						<a href="/"><li class="active">▻ Inicio</li></a>
					</ul>
				</div>
				<div class="logoTitulo">
                    <img id="imglogo" onclick="window.open('index.html', '_self')" style="display: block; margin-left: auto; margin-right: auto; width: 100px;" src="img/eyewebsLogoTransparente.png" alt="EYE webs Logo"/>
                    <p id="titulo"><b>E.Y.E.webs</b></p>
                </div>
			</nav>
			<!--fin encabezado-->
			<br/>
			<!--contenido de pagina de pagina-->
			<div class="contentb" style="margin-top: 50px; text-align: center;">
				<h1 style="font-size: 3rem;">Error 404</h1>
				<p><span>¿Te has perdido?</span><br/>
				<span>La página que buscas no existe o ha sido movida.</span></p>
				<br/>
				<p style="color: #666;">
					<span>Serás redirigido a la página principal en 10 segundos...</span><br/>
					<a href="index.html">Pulsa aquí si no quieres esperar.</a>
				</p>
			</div>
		</div>
		<!--fin contenido de pagina de pagina-->
		<!--pie de pagina-->
		<footer>
			<!-- Botón Imprimir integrado en el pie -->
			<p hidden class="printPageButton">
				<button onclick="window.print();"> Imprimir 🖨️ página 📝 </button>
			</p>
			<p>© 2021-2026 | diseñado por: E.Y.E.</p>
			<!-- El botón de subir suele ir al final para que cargue lo último -->
			<a href='#' class="stt" title="Subir arriba"></a>
		</footer>
		<!--fin pie de pagina-->
	</body>
</html>
