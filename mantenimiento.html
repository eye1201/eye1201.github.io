<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mantenimiento | E.Y.E.webs</title>
    <link rel="icon" type="image/png" href="img/eyewebsLogoFavicon.png"/>
    <link rel="stylesheet" href="css/eyewebstyle.css" type="text/css"/>
	<!--Color del navegador-->
    <meta name="theme-color" content="#ededed">
    <style>
        .mantenimiento {
            text-align: center;
            margin-top: 50px;
        }
        video {
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }
    </style>
</head>
	<body>
		<div class="content">
			<!--encabezado-->
			<nav role="navigation">
				<div id="menuToggle">
					<!--
					A fake / hidden checkbox is used as click reciever,
					so you can use the :checked selector on it.
					-->
					<input type="checkbox" disabled />			
					<!--
					Some spans to act as a hamburger.
					They are acting like a real hamburger,
					not that McDonalds stuff.
					-->
					<span></span>
					<span></span>
					<span></span>
					<!--
					Too bad the menu has to be inside of the button
					but hey, it's pure CSS magic.
					-->
					<ul id="menu">
						<a href="mantenimiento.html"><li>▻ Inicio</li></a>
					</ul>
				</div>
				<div class="logoTitulo">
					<img id="imglogo" onclick="window.open('mantenimiento.html '_self')" style="display: block; margin-left: auto; margin-right: auto; width: 100px;" src="img/eyewebsLogoTransparente.png" alt="EYE webs Logo"/>
					<p id="titulo"><b>E.Y.E.webs</b></p>
				</div>
			</nav>
			<!--fin encabezado-->
			<!--contenido de pagina de pagina-->
			<div class="contentb">
				<div class="mantenimiento">
					<p>
						<h3>Página en mantenimiento</h3>
						<span>Disculpen las molestias, estamos trabajando en mejoras.</span>
					</p>
					<video height="200" autoplay muted loop>
						<source src="video/mantenimiento.mp4" type="video/mp4">
						Tu navegador no soporta el formato de video.
					</video>
				</div>
			</div>
		</div>
		<!--fin contenido de pagina de pagina-->
		<!--pie de pagina-->
		<footer>
			<!-- Botón Imprimir integrado en el pie -->
			<p hidden class="printPageButton">
				<button onclick="window.print();"> Imprimir 🖨️ página 📝 </button>
			</p>
			<p>© 2021-2026 | diseñado por: E.Y.E.</p>
			<!-- El botón de subir suele ir al final para que cargue lo último -->
			<a href='#' class="stt" title="Subir arriba"></a>
		</footer>
		<!--fin pie de pagina-->
	</body>
</html>
